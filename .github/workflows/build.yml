name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: registry.thehawk970.space
  CACHE_REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

#      - uses: dorny/paths-filter@v3
#        id: changes
#        with:
#          filters: |
#            backend:  [apps/backend/**]

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.CACHE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          push: true
          tags: ${{ env.REGISTRY }}/thehawk970/bad_asso:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=${{ env.CACHE_REGISTRY }}/thehawk970/bad_asso:cache
          cache-to:   type=registry,ref=${{ env.CACHE_REGISTRY }}/thehawk970/bad_asso:cache,mode=max
